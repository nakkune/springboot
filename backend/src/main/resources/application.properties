spring.application.name=backend

# Security 임시 비활성화 (개발용)
spring.security.user.name=admin
spring.security.user.password=1q@W3e4r5t

# 서버 포트
server.port=9090
server.servlet.context-path=/api

# PostgreSQL 연결 정보
# ===========================
# PostgreSQL DataSource
# ===========================
spring.datasource.url=jdbc:postgresql://localhost:5433/springdb
spring.datasource.username=spring
spring.datasource.password=1q@W3e4r5t
spring.datasource.driver-class-name=org.postgresql.Driver
 
# ===========================
# HikariCP Connection Pool
# ===========================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
 
# ===========================
# MyBatis
# ===========================
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.type-aliases-package=com.nak.backend.user.dto
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
 
# ===========================
# Multipart File Upload
# ===========================
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# ===========================
# Logging
# ===========================
logging.level.com.nak.backend=DEBUG
logging.level.org.springframework.security=TRACE
